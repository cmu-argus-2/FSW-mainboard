     short_period_sim: # nominal
          num_sims: 1 # 100
          first_trial_number: 1 # for debugging, to repeat specific trial
          runtime: 40 # [seconds] how long the FSW is allowed to run
          sim_real_speedup : 1 # 275
          outfile: "sil_logs.log"
          fsw_percent_to_log: 1 # fraction of FSW data to log for plotting
          param_changes:
               MAX_TIME: 30 # 96000 # [s]
               PlotFlags:
                    percent_to_log : 1 # [0,1] fraction of the data to log for plotting
               initialization:
                    disperse_initial_angular_rate : False
                    initial_angular_rate : [1.0,1.0,1.0] # [rad/s] accessed iff disperse_initial_angular_rate is True
                    initial_angular_rate_dev : 1.5 # Max initial angular rate about any axis [rad/s]
                    initial_angular_rate_bound : 1.5 # Max initial angular rate norm [rad/s]
          fsw_config_param_changes:
               adcs:
