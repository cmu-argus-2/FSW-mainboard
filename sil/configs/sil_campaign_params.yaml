---
# -----------------------------------------------------------------------------------------------------------
# Sim campaign settings
# -----------------------------------------------------------------------------------------------------------
# This file contains parameters for the SIL simulation campaigns.
# list of sil batches to run
sil_campaign:
     sil_set_1: # nominal
          num_sims: 1 # 100
          first_trial_number: 1 # for debugging, to repeat specific trial
          runtime: 100 # [seconds] how long the FSW is allowed to run
          sim_real_speedup : 275
          outfile: "sil_logs.log"
          fsw_percent_to_log: 0.01 # fraction of FSW data to log for plotting
          param_changes:
               MAX_TIME: 30000 # 96000 # [s]
               PlotFlags:
                    percent_to_log : 0.01 # [0,1] fraction of the data to log for plotting
               initialization:
                    disperse_initial_angular_rate : False
                    initial_angular_rate : [1.0,1.0,1.0] # [rad/s] accessed iff disperse_initial_angular_rate is True
                    initial_angular_rate_dev : 1.5 # Max initial angular rate about any axis [rad/s]
                    initial_angular_rate_bound : 1.5 # Max initial angular rate norm [rad/s]
          fsw_config_param_changes:
               adcs:
                    CONTROLLER_MODE: 2
          description: "Baseline simulation campaign with nominal parameters."
