                    initial_angular_rate_dev : 2.0 # Max initial angular rate about any axis [rad/s]
                    initial_angular_rate_bound : 9.5 # Max initial angular rate norm [rad/s]
          fsw_config_param_changes:
               adcs:
                    CONTROLLER_MODE: 2
          description: "Baseline simulation campaign with nominal parameters."