               initialization:
                    disperse_initial_angular_rate : True
                    initial_angular_rate : [1.0,1.0,1.0] # [rad/s] accessed iff disperse_initial_angular_rate is True
                    initial_angular_rate_dev : 2.0 # Max initial angular rate about any axis [rad/s]
                    initial_angular_rate_bound : 9.5 # Max initial angular rate norm [rad/s]
          fsw_config_param_changes:
               adcs:
                    CONTROLLER_MODE: 1
          description: "Baseline simulation campaign with nominal parameters."
     lyapunov_nominal: # nominal
          num_sims: 100 # 100
          first_trial_number: 1 # for debugging, to repeat specific trial
          # runtime: 200 # [seconds] how long the FSW is allowed to run
          # sim_real_speedup : 275
          outfile: "sil_logs.log"
          fsw_percent_to_log: 0.01 # fraction of FSW data to log for plotting
          param_changes:
