# Author: Perrin
# Description: Ground testing configuration file, compiled as satellite_config module
# Note: Add "_const: true" to any value that should be wrapped with const() in MicroPython

# Commanding Task
command:
  EXIT_STARTUP_TIMEOUT: 
    value: 5  # seconds
    _const: true

  DETUMBLING_TIMEOUT_DURATION:
    value: 30  # seconds, i.e., 30 seconds
    _const: true
    
  BURN_WIRE_TIMEOUT:
    value: 2  # number of deployment attempts before forcing completion
    _const: true

  PAYLOAD_TESTING_MODE:
    value: false  # Set to true to enable payload testing mode (goes straight to experiment mode)

# Time Processor Module
time_processor:
  time_reference: 
    value: 1735689600  # Jan 1st 2025, 00:00:00 UTC
    _const: false

# Main Task
main:
  LOG_LEVEL:
    value: "INFO"

# HAL Monitor Task
hal_monitor:
  REGULAR_REBOOT:
    value: 3600 # seconds, i.e., 1 hour
    _const: true

# Comms App
comms:
  ARGUS_ID:
    value: 0
    _const: true
    _hex: true
  HB_PERIOD:
    value: 30  # seconds, i.e., 30 seconds
    _const: true
  AUTH_ENABLED:
    value: true
  AUTH_KEY_HEX:
    value: "d6172b38acb7d2a28e21662f689d1d15ad78ccc888a9c7a78ef58cb61b0f1e32" # TODO: Change before flight
  SC_CALLSIGN:
    value: "CT6xxx"
  GS_CALLSIGN:
    value: "CSXXXX"