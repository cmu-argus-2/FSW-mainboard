fail_fast: false

repos:
  # Black is not run in the CI/CD pipeline (linter.yml only uses flake8 + isort).
  # Disabled here for consistency
  # - repo: https://github.com/ambv/black
  #   rev: 22.10.0
  #   hooks:
  #     - id: black
  #       args: [--line-length=127]
  #       exclude: ^build/

  - repo: https://github.com/PyCQA/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: flake8 (syntax errors and undefined names)
        args: ["--select=E9,F63,F7,F82", "--show-source"]
        exclude: ^build/
      - id: flake8
        name: flake8 (general linting)
        exclude: ^build/

  - repo: https://github.com/pycqa/isort
    rev: 5.12.0
    hooks:
      - id: isort
        args: [--line-length=127]
        exclude: ^(build/|tests/)
